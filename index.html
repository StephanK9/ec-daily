<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Earth Calendar. Daily Reading</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #06101f;
    --card:      rgba(10,20,38,0.93);
    --gold:      #c9a84c;
    --gold-lt:   #e8cb72;
    --gold-dim:  #7a6330;
    --cream:     #f2e8d0;
    --cream-dim: #9e8e6e;
    --border:    rgba(201,168,76,0.2);
    --border-md: rgba(201,168,76,0.42);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'EB Garamond',Georgia,serif; background:var(--navy); color:var(--cream); min-height:100vh; overflow-x:hidden; }

  #stars { position:fixed; inset:0; z-index:0; pointer-events:none; width:100%; height:100%; }
  .bg-r { position:fixed; inset:0; z-index:0; pointer-events:none;
    background: radial-gradient(ellipse 60% 50% at 15% 15%, rgba(78,205,196,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 85%, rgba(78,205,196,0.05) 0%, transparent 60%); }

  .app { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:0 28px 100px; }

  /* ── HEADER ── */
  header { text-align:center; padding:56px 0 12px; }
  .h-rule { width:180px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:0 auto 20px; }
  .h-eye { font-family:'Cinzel',serif; font-size:11px; letter-spacing:7px; color:var(--gold-dim); text-transform:uppercase; margin-bottom:12px; }
  .h-title { font-family:'Cinzel Decorative',serif; font-size:clamp(30px,5vw,52px); font-weight:400; color:var(--gold-lt); letter-spacing:2px; line-height:1.1; animation:glow 5s ease-in-out infinite; }
  .h-sub { font-family:'Cinzel',serif; font-size:12px; letter-spacing:5px; color:var(--cream-dim); text-transform:uppercase; margin-top:10px; }
  @keyframes glow { 0%,100%{text-shadow:0 0 30px rgba(232,203,114,0.2)} 50%{text-shadow:0 0 60px rgba(232,203,114,0.5)} }

  /* ── DATE NAV ── */
  .date-nav { display:flex; align-items:center; justify-content:center; gap:24px; padding:30px 0 40px; }
  .nav-btn { width:48px; height:48px; border-radius:50%; border:1px solid var(--border-md); background:none; color:var(--gold); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .25s; }
  .nav-btn:hover { background:rgba(201,168,76,0.1); border-color:var(--gold); box-shadow:0 0 18px rgba(201,168,76,0.2); }
  .date-ctr { text-align:center; cursor:pointer; }
  .date-greg { font-family:'Cinzel',serif; font-size:clamp(22px,3.5vw,32px); font-weight:500; color:var(--cream); letter-spacing:1px; }
  .date-wday { font-family:'Cinzel',serif; font-size:13px; letter-spacing:6px; color:var(--gold); text-transform:uppercase; margin-top:5px; }
  .date-back { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--gold-dim); text-transform:uppercase; background:none; border:none; text-decoration:underline; cursor:pointer; margin-top:7px; display:block; }
  .date-back:hover { color:var(--gold); }
  #date-picker { display:none; }


  /* ── CARD BASE. start hidden, reveal on scroll ── */
  .card {
    border:1px solid var(--border); border-radius:3px; background:var(--card);
    backdrop-filter:blur(10px); margin-bottom:14px;
    opacity:0; transform:translateY(32px);
    transition: opacity 1.1s ease, transform 1.1s ease, border-color 0.3s;
  }
  .card.visible { opacity:1; transform:translateY(0); }
  .card:hover { border-color: var(--border-md); }

  /* ── HERO CARD REVEAL SEQUENCE ── */
  /* Step 1: sigil rises from dark */
  @keyframes sigilRise {
    0%   { opacity:0; transform:scale(0.85); filter:blur(8px); }
    40%  { opacity:0.18; transform:scale(1.02); filter:blur(2px); }
    100% { opacity:0.13; transform:scale(1); filter:blur(0px); }
  }
  /* Step 2: text bleeds in like ink */
  @keyframes inkBleed {
    0%   { opacity:0; filter:blur(6px); transform:translateY(8px); }
    100% { opacity:1; filter:blur(0px); transform:translateY(0); }
  }
  @keyframes inkBleedSlow {
    0%   { opacity:0; filter:blur(10px); }
    100% { opacity:1; filter:blur(0px); }
  }

  .sigil-wrap {
    animation: sigilRise 2.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  .hero-ink-1 { opacity:0; animation: inkBleed 1.2s ease both; animation-delay: 0.9s; }
  .hero-ink-2 { opacity:0; animation: inkBleed 1.4s ease both; animation-delay: 1.2s; }
  .hero-ink-3 { opacity:0; animation: inkBleed 1.4s ease both; animation-delay: 1.5s; }
  .hero-ink-4 { opacity:0; animation: inkBleed 1.4s ease both; animation-delay: 1.8s; }
  .hero-ink-5 { opacity:0; animation: inkBleedSlow 1.8s ease both; animation-delay: 2.1s; }
  .hero-ink-6 { opacity:0; animation: inkBleedSlow 2s ease both; animation-delay: 2.5s; }

  /* ── CONSTELLATION SIGIL. breathing glow after reveal ── */
  @keyframes sigilBreathe {
    0%,100% { opacity:0.10; }
    50%      { opacity:0.20; }
  }
  .sigil-wrap.breathing { animation: sigilBreathe 5s ease-in-out infinite; }

  /* ── KEYWORD SHIMMER. smooth JS fade, no flicker ── */
  @keyframes kwIn {
    from { opacity:0; transform:translateX(-4px); }
    to   { opacity:0.9; transform:translateX(0); }
  }
  .kw { opacity:0.9; transition: none; }
  .kw.anim-pending { opacity:0; }
  .kw.visible { animation: kwIn 0.8s ease both; }

  /* ── PLANET SYMBOL PULSE ── */
  @keyframes planetPulse {
    0%,100% { filter: drop-shadow(0 0 3px currentColor); }
    50%      { filter: drop-shadow(0 0 14px currentColor); }
  }
  .planet-sym-pulse { animation: planetPulse 4s ease-in-out infinite; }

  /* ── HEADER ── */
  header { animation: headerIn 1.4s ease both; }
  @keyframes headerIn {
    from { opacity:0; transform:translateY(-12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .date-nav { animation: headerIn 1.4s ease 0.3s both; }

  /* ── CARD LABEL ── */
  .c-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:5px; text-transform:uppercase; color:var(--cream-dim); margin-bottom:14px; }

  /* ── KEYWORDS ── */
  .keywords { display:flex; gap:6px; flex-wrap:wrap; margin:12px 0 20px; }
  .kw { font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; padding:5px 12px; border-radius:2px; border:1px solid; opacity:0.9; }

  /* ── HERO CARD ── */
  .hero { padding:52px 48px 48px; text-align:center; position:relative; overflow:hidden; }
  .hero::after { content:''; position:absolute; inset:0; z-index:0; pointer-events:none; background:radial-gradient(ellipse 80% 70% at 65% 50%, rgba(78,205,196,0.06), transparent 70%); }
  .hero-in { position:relative; z-index:1; }
  .orb { width:110px; height:110px; margin:0 auto 28px; }
  .orb svg { width:100%; height:100%; }
  .hero-eyebrow { font-family:'Cinzel',serif; font-size:12px; letter-spacing:6px; text-transform:uppercase; margin-bottom:10px; }
  .hero-name { font-family:'Cinzel Decorative',serif; font-size:clamp(36px,6vw,58px); font-weight:400; color:var(--cream); line-height:1.1; margin-bottom:8px; }
  .hero-arch { font-family:'Cinzel',serif; font-size:clamp(14px,2vw,18px); letter-spacing:4px; text-transform:uppercase; color:var(--cream-dim); margin-bottom:6px; }
  .hero-meta { font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px; color:var(--cream-dim); text-transform:uppercase; margin-bottom:0; }
  .hero-rule { width:80px; height:1px; margin:24px auto; }
  .hero-body { font-size:clamp(19px,2.2vw,23px); line-height:1.88; color:var(--cream); max-width:640px; margin:0 auto 18px; }
  .hero-context { font-size:clamp(17px,2vw,20px); line-height:1.8; font-style:italic; max-width:580px; margin:0 auto; }

  /* ── STAT ROW ── */
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px; }
  .stat { padding:28px 20px 24px; text-align:center; }
  .stat .c-label { margin-bottom:10px; }
  .stat-sym { font-size:46px; line-height:1; display:block; margin-bottom:10px; }
  .stat-num { font-family:'Cinzel Decorative',serif; font-size:clamp(44px,6vw,66px); font-weight:400; line-height:1; display:block; margin-bottom:6px; }
  .stat-val { font-family:'Cinzel Decorative',serif; font-size:clamp(17px,2.2vw,22px); font-weight:400; color:var(--cream); line-height:1.2; display:block; margin-bottom:5px; }
  .stat-sub { font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--cream-dim); display:block; }

  /* ── STANDARD CARD BODY ── */
  .c-pad { padding:36px 40px 34px; }
  .c-title { font-family:'Cinzel Decorative',serif; font-size:clamp(22px,3vw,30px); font-weight:400; color:var(--cream); margin-bottom:6px; line-height:1.15; }
  .c-sub { font-family:'Cinzel',serif; font-size:12px; letter-spacing:4px; text-transform:uppercase; color:var(--cream-dim); margin-bottom:0; }
  .c-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0; flex-wrap:wrap; gap:12px; }
  .c-sym-big { font-size:52px; line-height:1; }
  .c-body { font-size:clamp(18px,2vw,21px); line-height:1.88; color:var(--cream); margin-bottom:14px; }
  .c-context { font-size:clamp(17px,1.9vw,20px); line-height:1.8; font-style:italic; color:var(--cream); }
  .c-divider { height:1px; margin:20px 0; background:linear-gradient(90deg,transparent,rgba(201,168,76,0.2),transparent); }

  /* ── PIP ROW (week progress) ── */
  .pip-row { display:grid; grid-template-columns:repeat(28,1fr); gap:3px; margin:20px 0; }
  .pip { height:9px; border-radius:2px; background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.13); }

  /* ── PHASE BAR ── */
  .pbar-wrap { margin:16px 0; }
  .pbar { height:4px; background:rgba(201,168,76,0.1); border-radius:2px; overflow:hidden; margin-bottom:6px; }
  .pbar-fill { height:100%; background:linear-gradient(90deg,rgba(74,144,196,0.6),var(--gold)); border-radius:2px; }
  .ppct { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--cream-dim); text-align:right; }

  /* ── DETAIL GRID ── */
  .detail-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }

  /* ── SYNTHESIS ── */
  .synth { padding:44px 48px; }
  .synth-eye { font-family:'Cinzel',serif; font-size:11px; letter-spacing:6px; text-transform:uppercase; margin-bottom:20px; }
  .synth-rule { width:60px; height:1px; margin-bottom:28px; }
  .synth-body { font-size:clamp(19px,2.3vw,24px); line-height:2; color:var(--cream); }
  .synth-body strong { font-family:'Cinzel',serif; font-style:normal; font-size:0.82em; letter-spacing:1px; }

  footer { text-align:center; padding:50px 0 20px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:5px; text-transform:uppercase; color:var(--gold-dim); }

  @media(max-width:640px){
    .app{padding:0 16px 80px}
    .stats{grid-template-columns:1fr}
    .detail-row{grid-template-columns:1fr}
    .hero{padding:28px 20px 28px}
    .c-pad{padding:28px 22px}
    .synth{padding:32px 22px}
    .hero-two-col{grid-template-columns:1fr !important}
    .hero-two-col .hero-right{display:flex;flex-direction:row;justify-content:center;gap:32px;padding-top:0}
    /* Hero text takes full width on mobile, glyph shrinks to corner */
    .hero-text-col { max-width:100% !important; }
    .hero-arch { flex-wrap:wrap; gap:6px !important; }
    .hero-name { font-size:clamp(28px,8vw,42px) !important; }
    .keywords { gap:5px; }
    .kw { font-size:10px; padding:4px 9px; }
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="bg-r"></div>
<div class="app">

  <header>
    <div class="h-rule"></div>
    <p class="h-eye">△ &nbsp; The Earth Calendar &nbsp; △</p>
    <h1 class="h-title">Daily Reading</h1>
    <p class="h-sub">13 Moons &nbsp;·&nbsp; 4 Weeks &nbsp;·&nbsp; 7 Tones</p>
    <div class="h-rule" style="margin-top:18px"></div>
  </header>

  <div class="date-nav">
    <button class="nav-btn" id="prev-day">←</button>
    <div class="date-ctr" onclick="document.getElementById('date-picker').showPicker?.()??document.getElementById('date-picker').click()">
      <div class="date-greg" id="greg-date">,</div>
      <div class="date-wday" id="greg-wday">,</div>
      <button class="date-back" id="today-btn" onclick="event.stopPropagation();goToday()">Return to Today</button>
    </div>
    <button class="nav-btn" id="next-day">→</button>
  </div>
  <input type="date" id="date-picker">

  <div id="reading"></div>
  <footer>© The Earth Calendar &nbsp;·&nbsp; SK3D &nbsp;·&nbsp; All Rights Reserved</footer>
</div>

<script>
// ═══════════════════════════════════════════════════
// ELEMENT COLORS
// ═══════════════════════════════════════════════════
const EC = {
  Fire:  {p:'#e8762a',g:'rgba(232,118,42,0.45)',d:'rgba(232,118,42,0.07)',b:'rgba(232,118,42,0.32)'},
  Water: {p:'#4a96c8',g:'rgba(74,150,200,0.45)', d:'rgba(74,150,200,0.07)', b:'rgba(74,150,200,0.32)'},
  Earth: {p:'#6dba48',g:'rgba(109,186,72,0.45)', d:'rgba(109,186,72,0.07)', b:'rgba(109,186,72,0.32)'},
  Air:   {p:'#a07cd8',g:'rgba(160,124,216,0.45)',d:'rgba(160,124,216,0.07)',b:'rgba(160,124,216,0.32)'},
  All:   {p:'#c9a84c',g:'rgba(201,168,76,0.45)', d:'rgba(201,168,76,0.07)', b:'rgba(201,168,76,0.32)'},
};

// ═══════════════════════════════════════════════════
// 13 MOONS
// ═══════════════════════════════════════════════════
const MOONS = [
{
  name:"Dreaming", s:[1,1], e:[1,28], arch:"The Dreamer", archDesc:"The one who receives before they act. The Dreamer doesn't reach for meaning — they wait for it to surface. Their gift is the image that arrives before language, the knowing that precedes thought.", el:"Water", sym:"○",
  kw:["stillness","reception","the void"],
  stable:"The year opens before it knows what it is. Dreaming Moon is the water beneath everything — pre-verbal, pre-form, existing before direction has arrived. This is the first of the Water moons: internal, receptive, still. Images surface here before they have names.",
  ctx:{
    1:"Day one of the cycle and everything is still open. The impression is more useful than the plan right now.",
    2:"The direction is beginning to form. something is pulling into focus from the stillness.",
    3:"Mid-cycle in a Water moon: the internal work is the real work, even when it looks like nothing is happening.",
    4:"The Dreaming cycle closes. What came through the stillness becomes clearer as the moon ends."
  }
},
{
  name:"Seed", s:[1,29], e:[2,25], arch:"The Sower", archDesc:"The one who reads the ground before placing anything in it. The Sower knows that what gets planted shapes everything that follows. Deliberate, unhurried, committed to quality over quantity.", el:"Earth", sym:"△",
  kw:["intention","planting","direction"],
  stable:"Seed Moon is where intention meets ground. Earth element, which means nothing stays abstract here for long. The Sower doesn't scatter. They read the conditions, choose what goes in, and commit to it. This moon is about the quality of what gets started, not how much.",
  ctx:{
    1:"Day one of Seed Moon. The ground is ready. What gets planted now carries this moon's full weight.",
    2:"The plan sharpens into something actionable. The direction is clear enough to commit to.",
    3:"The work is in motion. Seed Moon in its action week — what was planted is taking root.",
    4:"The cycle closes. What was seeded this moon is already in the ground. The rest is time."
  }
},
{
  name:"Sprout", s:[2,26], e:[3,25], arch:"The Student", archDesc:"The one for whom the question is more alive than the answer. The Student moves through the world with open hands — curious, undefended, willing to not know yet. That openness is the skill.", el:"Air", sym:")",
  kw:["emergence","curiosity","early form"],
  stable:"Something broke the surface. Sprout Moon is the first Air moon of the year. curious, questioning, still finding its shape. The Student archetype doesn't know yet, and that's correct. This is not a moon for certainty. Questions are more alive here than answers.",
  ctx:{
    1:"The cycle begins fresh. The energy is open, the form still loose.",
    2:"The curiosity sharpens. something is becoming clearer even if it's not fully formed.",
    3:"Action week in an Air moon: movement through thinking, connecting, communicating.",
    4:"Sprout Moon closes. What was learning and emerging lands into its final early form."
  }
},
{
  name:"Bloom", s:[3,26], e:[4,22], arch:"The Artist", archDesc:"The one who doesn't wait for permission. The Artist moves when the work is ready to move — not when conditions are perfect, not when fear has subsided. Expression is the act of becoming visible.", el:"Fire", sym:"▲",
  kw:["expression","visibility","creation"],
  stable:"The fire moons are where things come out of hiding, where energy wants to be seen, shaped, shared. Bloom is the moment the cycle turns fully outward. The Artist archetype doesn't wait for permission. What was forming in Sprout is ready to move, ready to be made visible.",
  ctx:{
    1:"Day one of Bloom. The creative arc is fully ahead. The charge is here before the direction is fixed.",
    2:"The vision is sharpening into something makeable. The plan behind the expression.",
    3:"Bloom Moon in its peak action week. this is the highest-output window of the year's creative cycle.",
    4:"The Bloom cycle closes. What was made and expressed lands into its completed form."
  }
},
{
  name:"Nectar", s:[4,23], e:[5,20], arch:"The Lover", archDesc:"The one who is attuned to what actually nourishes. The Lover isn't ruled by desire — they're fluent in it. They know the difference between what they want and what feeds them. Pleasure as intelligence.", el:"Water", sym:"○",
  kw:["pleasure","nourishment","receiving"],
  stable:"Nectar Moon follows the peak of Bloom. The energy turns from outward expression toward depth and savoring. A Water moon. feeling, relational, attuned to what actually nourishes. The Lover archetype is specific: not about romance, but about the capacity to receive what is genuinely good. Pleasure as signal.",
  ctx:{
    1:"The cycle opens in depth. The question this moon asks is what actually feeds you.",
    2:"What matters most is becoming clearer. The relational quality of work and life sharpens.",
    3:"Peak week in a Water moon: the depth is most accessible here. What nourishes is obvious.",
    4:"Nectar closes. What was received and savored this moon settles into the body."
  }
},
{
  name:"Flame", s:[5,21], e:[6,17], arch:"The Warrior", archDesc:"The one who moves from clarity, not from rage. The Warrior doesn't fight everything — they've learned to choose their battles and stand behind them completely. Conviction is the weapon.", el:"Fire", sym:"▲",
  kw:["conviction","clarity","will"],
  stable:"Flame Moon is the second Fire moon. but where Bloom was about creative expression, Flame is about conviction. The Warrior archetype moves from absolute clarity, not from emotion. This moon sharpens what you stand behind. Ambiguity tends to resolve here. The fire doesn't scatter. it cuts.",
  ctx:{
    1:"Flame opens. The directional quality of this moon is already present from the first day.",
    2:"The conviction is forming into a plan — what you stand behind becomes actionable.",
    3:"Flame Moon in full motion: directed, purposeful, at peak will.",
    4:"The cycle closes with what remains after the fire has clarified. That's what's real."
  }
},
{
  name:"Fruit", s:[6,18], e:[7,15], arch:"The Gatherer", archDesc:"The one who knows how to receive. The Gatherer has done the planting and the tending — now comes the harder practice of actually letting the harvest in. Receiving without deflecting is the work.", el:"Earth", sym:"△",
  kw:["fulfillment","receiving","abundance"],
  stable:"Fruit Moon is the midpoint of the year. an Earth moon of arrival. What was planted, cultivated, and fought for earlier in the cycle begins to appear in its physical form. The Gatherer archetype is specific: receiving is its own practice. This moon requires the capacity to let the harvest actually land.",
  ctx:{
    1:"The arrival cycle opens. What's coming has been a long time forming.",
    2:"The shape of what's arriving becomes more visible. Start to take stock.",
    3:"Peak week of Fruit Moon: results surface, things complete, abundance is most tangible here.",
    4:"Fruit Moon closes. What was received is received. The year turns toward its second half."
  }
},
{
  name:"Sunroot", s:[7,16], e:[8,12], arch:"The Sovereign", archDesc:"The one who has earned their own authority. The Sovereign doesn't rule by force or performance — they stand in what they've built and metabolised. Presence is the only credential that matters here.", el:"Earth", sym:"△",
  kw:["sovereignty","groundedness","legacy"],
  stable:"Sunroot Moon sits at the height of summer — the most solar point of the year. Earth element combined with the Sovereign archetype describes something specific: this is the quality of established presence. Not striving, not building — standing. What has been built holds. The longest light, the most grounded authority.",
  ctx:{
    1:"The peak of the year opens. The energy is full, stable, sovereign.",
    2:"The direction of the second half of the year becomes clear. What endures is obvious.",
    3:"Sunroot in full motion: the most stable, self-directed week of the most stable moon.",
    4:"The sovereign cycle closes. The year begins its quiet turn toward completion."
  }
},
{
  name:"Harvest", s:[8,13], e:[9,9], arch:"The Teacher", archDesc:"The one who has lived it long enough to distil it. The Teacher isn't performing knowledge — they're offering what was hard-won. Transmission only becomes possible once understanding has been fully earned.", el:"Air", sym:")",
  kw:["distillation","sharing","discernment"],
  stable:"Harvest Moon follows the summer peak. An Air moon — the energy shifts from presence to transmission. The Teacher archetype emerges when experience has been lived long enough to distill: not performing knowledge, but offering what has actually been understood. This moon asks what's worth keeping and what's worth passing on.",
  ctx:{
    1:"Harvest opens. The distillation process begins — what does this year actually know?",
    2:"The discernment sharpens. What gets shared versus what gets released becomes clear.",
    3:"Peak week of Harvest: communication, teaching, and transmission are most alive here.",
    4:"The cycle closes. What was understood is now something that can be carried forward."
  }
},
{
  name:"Shedding", s:[9,10], e:[10,7], arch:"The Alchemist", archDesc:"The one who understands that dissolution comes before gold. The Alchemist doesn't cling to forms past their usefulness — they trust the transformation that only becomes possible after the release.", el:"Water", sym:"○",
  kw:["release","truth","transformation"],
  stable:"Shedding Moon is the autumn turn. a Water moon of dissolution. The Alchemist archetype understands that new forms require the release of old ones. This isn't destruction. it's the specific intelligence of knowing what has served its purpose. The emotional material that surfaces in this moon tends to be accurate.",
  ctx:{

// ═══════════════════════════════════════════════════
function midnight(d){
  return new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
}

function moonData(date){
  const y=date.getFullYear(), d=midnight(date);
  for(const m of MOONS){
    const s=new Date(Date.UTC(y,m.s[0]-1,m.s[1]));
    const e=new Date(Date.UTC(y,m.e[0]-1,m.e[1]));
    if(d>=s&&d<=e){
      const day=Math.round((d-s)/86400000)+1;
      return{moon:m, day, week:WEEKS[Math.min(Math.floor((day-1)/7),3)]};
    }
  }
  const dot = {
    name:"Day Out of Time", arch:"The Threshold", el:"All", sym:"◎",
    kw:["threshold","pause","between"],
    stable:"December 31. The one day each year that sits outside all 13 moons and all 4 weeks. The Earth Calendar runs 364 days. 13 × 28. The 365th day belongs to no cycle. It is the sacred pause between the year that closed and the year that hasn't opened.",
    ctx:{0:"The cycle is complete. Today holds no moon energy, no week rhythm. only the space between."}
  };
  return{moon:dot, day:0, week:{n:0,name:"Day Out of Time",days:"31",kw:[],stable:"",elCtx:{}}};
}

function lunarPhase(date){
  const ref=new Date(2000,0,6,18,14,0), cycle=29.53058867;
  const phase=(((date-ref)/86400000%cycle)+cycle)%cycle;
  const illum=Math.round((1-Math.cos(phase/cycle*2*Math.PI))/2*100);
  for(const p of PHASES) if(phase<=p.max) return{...p,illum};
  return{...PHASES[0],illum:0};
}

function weekPosition(day, weekN){
  if(day === 0) return 'Day Out of Time';
  const dayInWeek = day - (weekN - 1) * 7;
  if(dayInWeek === 1) return `Day 1 of 7, opening`;
  if(dayInWeek === 7) return `Day 7 of 7, closing`;
  if(dayInWeek <= 3) return `Day ${dayInWeek} of 7, early`;
  if(dayInWeek === 4) return `Day 4 of 7, midpoint`;
  return `Day ${dayInWeek} of 7, late`;
}

function weekPositionText(day, weekN, el){
  if(day === 0) return '';
  const dayInWeek = day - (weekN - 1) * 7;
  const pos = dayInWeek <= 2 ? 'early' : dayInWeek <= 4 ? 'mid' : dayInWeek <= 6 ? 'late' : 'closing';

  const map = {
    1: {
      early:   "The week just opened. The field is at its widest. Direction is still forming.",
      mid:     "The opening week is finding its shape. What arrived in the first days is beginning to clarify.",
      late:    "Week 1 is nearing its end. The initial impressions are settling into something more specific.",
      closing: "The final day of Dream and Drop. What this week revealed carries into Week 2 tomorrow.",
    },
    2: {
      early:   "Spark and Plan has just opened. The signal from Week 1 is sharpening into something actionable.",
      mid:     "Mid-planning week. The map is being drawn. What gets decided here sets the trajectory for Week 3.",
      late:    "Late Week 2. The preparation is nearly complete. Structure is in place before the action begins.",
      closing: "The last day of Spark and Plan. What hasn't been decided either gets resolved today or enters the build week open.",
    },
    3: {
      early:   "Move and Build has just opened. The momentum that was prepared is now available.",
      mid:     "Mid-build week. The work is in full motion. This is the peak execution point of the entire 28-day cycle.",
      late:    "Late Week 3. The build is reaching its natural completion. What was in motion is landing.",
      closing: "The last day of Move and Build. What gets finished today is finished. What doesn't carries into Week 4.",
    },
    4: {
      early:   "Reflect and Release has just opened. The momentum of Week 3 is still present, but the energy is shifting toward completion.",
      mid:     "Mid-completion week. Assessment is the work now. What moved, what didn't, what the moon actually produced.",
      late:    "Late Week 4. The moon is nearly complete. The next moon is close.",
      closing: "The final day of this moon. Tomorrow a new 28-day cycle begins.",
    },
  };

  return (map[weekN] && map[weekN][pos]) || '';
}

function pips(day,week,col){
  const ws=(week.n-1)*7+1, we=week.n*7;
  return Array.from({length:28},(_,i)=>{
    const d=i+1,cur=d===day,past=d<day&&d>=ws&&d<=we,inW=d>=ws&&d<=we;
    let s='';
    if(cur)  s=`background:${col};border-color:${col};box-shadow:0 0 8px ${col}`;
    else if(past) s=`background:${col}55;border-color:${col}55`;
    else if(inW)  s=`border-color:${col}44`;
    return `<div class="pip" style="${s}" title="Day ${d}"></div>`;
  }).join('');
}

function buildSynthesis(moon, week, pl, lp, day, c){
  if(week.n===0) return `Today is the Day Out of Time. December 31. The 13-moon cycle is complete. No moon governs today. No week. The year ends and the space between years opens.<br><br>The astronomical moon is ${lp.name}, ${lp.illum}% illuminated. ${lp.context}`;

  const moonN   = MOONS.indexOf(moon)+1;
  const dayInWeek = day - (week.n-1)*7;
  const weeksRemaining = 4 - week.n;
  const daysRemaining = 28 - day;
  const prevMoon = moonN > 1 ? MOONS[moonN-2] : null;
  const nextMoon = moonN < 13 ? MOONS[moonN] : null;
  const nextWeek = week.n < 4 ? WEEKS[week.n] : null; // WEEKS is 0-indexed so week.n = next week

  // Arc sentences. written fresh, not repeating card content
  const arcMap = {
    // Week 1 arc: just arrived from previous moon, whole cycle ahead
    1: {
      early: prevMoon
        ? `${prevMoon.name} Moon just closed. Whatever that ${prevMoon.el.toLowerCase()} cycle asked of you is done. ${moon.name} opens differently. ${moon.el} element, first week, nothing fixed yet. The full 28 days are still ahead.`
        : `The year opens in ${moon.name} Moon. First week, first days. The whole cycle is still ahead, direction not yet visible.`,
      mid: prevMoon
        ? `A few days into ${moon.name} Moon now. The shift from ${prevMoon.name} is settling. Week 1 is where this moon's character starts to declare itself, before anything is committed to.`
        : `A few days into the year's first moon. The field is wide. Nothing needs to be decided yet.`,
      late: `Week 1 of ${moon.name} Moon is almost done. What's been forming in these opening days will sharpen into direction when Week 2 opens. Three weeks remain in this cycle.`,
      closing: `Last day of Week 1. Tomorrow ${moon.name} Moon enters Spark and Plan — the planning week. What this first week revealed is the raw material. Week 2 works with it.`,
    },
    // Week 2 arc: Week 1 done, building toward action
    2: {
      early: `Week 1 of ${moon.name} Moon is behind you. Spark and Plan has just opened. The impressions from the opening week are available now as actual direction. Two and a half weeks remain.`,
      mid: `Midway through Week 2 of ${moon.name} Moon. The planning window is at its most useful here. What gets mapped now is what Week 3 builds from.`,
      late: `Late in the planning week. ${moon.name} Moon's action phase begins soon. What's been prepared becomes what's executed. One day of planning left, then the build starts.`,
      closing: `Last day of Spark and Plan. ${moon.name} Moon enters Move and Build tomorrow. The preparation phase is complete. What's ready is ready.`,
    },
    // Week 3 arc: peak action, what has the moon produced so far
    3: {
      early: `${moon.name} Moon is in its peak week. Weeks 1 and 2 set the direction and mapped the plan. This is where that becomes real. The highest-output window of the cycle.`,
      mid: `Mid-build week in ${moon.name} Moon. The work that was prepared in Week 2 is fully in motion. One week of action left after this, then the moon moves into completion.`,
      late: `${moon.name} Moon is approaching its final stretch. The build week is nearly done. Week 4 opens soon, and with it the question of what this cycle actually produced.`,
      closing: `Last day of Move and Build. ${moon.name} Moon enters Reflect and Release tomorrow. Whatever is in motion now carries into the completion week. The building phase is done.`,
    },
    // Week 4 arc: what was this moon, what's next
    4: {
      early: `${moon.name} Moon is in its final week. Three weeks of ${moon.el.toLowerCase()} energy have moved through. What's left now is integration${nextMoon ? ` before ${nextMoon.name} Moon opens` : ''}.`,
      mid: `Midway through the last week of ${moon.name} Moon. The cycle has produced what it's going to produce. What remains is recognising it clearly${nextMoon ? ` and releasing what doesn't carry into ${nextMoon.name}` : ''}.`,
      late: nextMoon
        ? `${moon.name} Moon is nearly complete. ${nextMoon.name} Moon opens in ${daysRemaining} day${daysRemaining===1?'':'s'}. ${nextMoon.el} element, ${nextMoon.arch}. The shift is already close.`
        : `The final moon of the year is nearly complete. The Day Out of Time is ${daysRemaining} day${daysRemaining===1?'':'s'} away.`,
      closing: nextMoon
        ? `Last day of ${moon.name} Moon. ${nextMoon.name} Moon opens tomorrow. ${nextMoon.arch}. ${nextMoon.el} element. Tonight is the threshold.`
        : `Last day of ${moon.name} Moon and the last day of the year's final cycle. The Day Out of Time is tomorrow.`,
    },
  };

  const pos = dayInWeek <= 2 ? 'early' : dayInWeek <= 4 ? 'mid' : dayInWeek <= 6 ? 'late' : 'closing';
  const arcText = (arcMap[week.n] && arcMap[week.n][pos]) || '';

  // Archetype × week — specific meaning of this archetype at this point in the cycle
  const archWeekText = (ARCH_WEEK[moon.arch] && ARCH_WEEK[moon.arch][week.n]) || '';

  // Element + week combination
  const elWeekInsight = week.elCtx[moon.el] || '';

  // Planet — clean single contextual line, no redundant label
  const plCtx = pl.moonCtx[moon.el] || pl.stable.split('.')[0];
  const planetLine = `<strong style="color:${pl.col}">${pl.name}</strong> — ${pl.kw.join(', ')}. ${plCtx}.`;

  // Lunar phase
  const phaseLine = `${lp.name} at ${lp.illum}%. ${lp.context}`;

  // Practical layer — planet × element × week (112 unique combinations)
  const practical = (PRACTICAL[pl.planet] && PRACTICAL[pl.planet][moon.el] && PRACTICAL[pl.planet][moon.el][week.n]) || '';

  return [
    arcText,
    archWeekText,

let cur=new Date(); cur.setHours(12,0,0,0);

// ═══════════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════════
(function(){
  const cv=document.getElementById('stars'),x=cv.getContext('2d');
  let S=[],t=0;
  function resize(){
    cv.width=innerWidth;cv.height=innerHeight;
    S=Array.from({length:Math.floor(cv.width*cv.height/3600)},()=>({
      x:Math.random()*cv.width, y:Math.random()*cv.height,
      r:Math.random()*1.3+0.2, a:Math.random()*0.7+0.2,
      sp:Math.random()*0.28+0.07, ph:Math.random()*Math.PI*2
    }));
  }
  function draw(){
    x.clearRect(0,0,cv.width,cv.height); t+=0.004;
    for(const s of S){
      const a=s.a*(0.55+0.45*Math.sin(t*s.sp+s.ph));
      x.beginPath(); x.arc(s.x,s.y,s.r,0,Math.PI*2);
      x.fillStyle=`rgba(242,234,210,${a})`; x.fill();
    }
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize); resize(); draw();
})();

render(cur);

// ── SCROLL-TRIGGERED ANIMATIONS ──────────────────────────────────────────────

function initAnimations() {
  // Switch sigil from reveal to breathing mode after initial animation
  const sigil = document.querySelector('.sigil-wrap');
  if (sigil) {
    setTimeout(() => {
      sigil.style.animation = 'none';
      sigil.style.opacity = '0.13';
      void sigil.offsetWidth; // reflow
      sigil.classList.add('breathing');
    }, 2600);
  }

  // 1. Cards fade up on scroll. slower stagger
  const cardObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => {
          entry.target.classList.add('visible');
        }, i * 120);
        cardObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });

  // Skip first card (hero). it has its own ink sequence
  const cards = document.querySelectorAll('.card');
  cards.forEach((card, i) => {
    if (i === 0) {
      card.style.opacity = '1';
      card.style.transform = 'none';
      card.style.transition = 'none';
    } else {
      cardObserver.observe(card);
    }
  });

  // 2. Keywords. mark pending first frame, then animate in smoothly
  const allKws = document.querySelectorAll('.kw');
  allKws.forEach(kw => kw.classList.add('anim-pending'));

  const kwObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const kws = entry.target.querySelectorAll('.kw.anim-pending');
        kws.forEach((kw, i) => {
          setTimeout(() => {
            kw.classList.remove('anim-pending');
            kw.classList.add('visible');
          }, 200 + i * 100);
        });
        kwObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });

  document.querySelectorAll('.card').forEach(card => kwObserver.observe(card));

  setTimeout(reportHeight, 1000);
}

// ── HEIGHT REPORTING ─────────────────────────────────────────────────────────

function reportHeight() {
  window.parent.postMessage({ type: 'ec-height', height: document.body.scrollHeight }, '*');
}
window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);
setTimeout(reportHeight, 500);
setTimeout(reportHeight, 1500);

// Re-init animations whenever content re-renders (date change)
const _origRender = render;
window._renderWithAnims = function(date) {
  _origRender(date);
  setTimeout(initAnimations, 50);
  setTimeout(reportHeight, 800);
};

document.getElementById('prev-day').onclick = () => { cur.setDate(cur.getDate()-1); window._renderWithAnims(cur); };
document.getElementById('next-day').onclick = () => { cur.setDate(cur.getDate()+1); window._renderWithAnims(cur); };
document.getElementById('date-picker').onchange = e => {
  if(!e.target.value) return;
  const[y,m,d]=e.target.value.split('-').map(Number);
  cur=new Date(y,m-1,d,12,0,0);
  window._renderWithAnims(cur);
};
document.onkeydown = e => {
  if(e.key==='ArrowLeft'){cur.setDate(cur.getDate()-1);window._renderWithAnims(cur);}
  if(e.key==='ArrowRight'){cur.setDate(cur.getDate()+1);window._renderWithAnims(cur);}
  if(e.key==='t'||e.key==='T') goToday();
};
function goToday(){cur=new Date();cur.setHours(12,0,0,0);window._renderWithAnims(cur);}

// Init on first load
setTimeout(initAnimations, 100);
</script>
